<style>
  * { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background-color: #faf8f5; color: #2c1f14; }
  h1, h2, h3 { font-family: 'Playfair Display', serif; }

  @keyframes fadeInUp {
    from { opacity: 0; transform: translateY(40px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
  }
  @keyframes slideDown {
    from { opacity: 0; transform: translateY(-20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes bounce-slow {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(8px); }
  }
  @keyframes countUp {
    from { opacity: 0; transform: scale(0.8); }
    to { opacity: 1; transform: scale(1); }
  }
  @keyframes pulse-badge {
    0%, 100% { box-shadow: 0 0 0 0 rgba(139, 94, 60, 0.4); }
    50% { box-shadow: 0 0 0 12px rgba(139, 94, 60, 0); }
  }

  .animate-fadeInUp { animation: fadeInUp 0.8s ease forwards; }
  .animate-fadeIn { animation: fadeIn 1.2s ease forwards; }
  .animate-slideDown { animation: slideDown 0.6s ease forwards; }
  .animate-bounce-slow { animation: bounce-slow 2s ease-in-out infinite; }
  .animate-countUp { animation: countUp 0.6s ease forwards; }
  .animate-pulse-badge { animation: pulse-badge 2.5s infinite; }

  .delay-100 { animation-delay: 0.1s; }
  .delay-200 { animation-delay: 0.2s; }
  .delay-300 { animation-delay: 0.3s; }
  .delay-400 { animation-delay: 0.4s; }
  .delay-500 { animation-delay: 0.5s; }
  .delay-600 { animation-delay: 0.6s; }

  .opacity-0-start { opacity: 0; }

  .nav-scrolled {
    background-color: rgba(250, 248, 245, 0.97) !important;
    backdrop-filter: blur(12px);
    box-shadow: 0 1px 30px rgba(44, 31, 20, 0.08);
  }

  .hero-bg {
    background: linear-gradient(
      135deg,
      #2c1f14 0%,
      #4a3728 25%,
      #3d2b1f 50%,
      #1a0f08 75%,
      #0d0805 100%
    );
    position: relative;
    overflow: hidden;
  }
  .hero-bg::before {
    content: '';
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(139, 94, 60, 0.25) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 20%, rgba(196, 149, 106, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 60% 80%, rgba(44, 31, 20, 0.8) 0%, transparent 70%);
  }
  .hero-bg::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image: 
      repeating-linear-gradient(
        0deg,
        transparent,
        transparent 2px,
        rgba(255,255,255,0.015) 2px,
        rgba(255,255,255,0.015) 4px
      );
    pointer-events: none;
  }

  .dot-pattern {
    background-image: radial-gradient(circle, #c4956a22 1px, transparent 1px);
    background-size: 28px 28px;
  }
  .grid-pattern {
    background-image: 
      linear-gradient(rgba(139, 94, 60, 0.06) 1px, transparent 1px),
      linear-gradient(90deg, rgba(139, 94, 60, 0.06) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .diagonal-section {
    clip-path: polygon(0 4%, 100% 0%, 100% 96%, 0 100%);
    margin: -2rem 0;
    padding: 8rem 0 8rem;
  }
  .diagonal-top {
    clip-path: polygon(0 0, 100% 5%, 100% 100%, 0 100%);
  }
  .diagonal-bottom {
    clip-path: polygon(0 0, 100% 0, 100% 95%, 0 100%);
  }

  .service-card {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
    background: white;
  }
  .service-card:hover {
    transform: translateY(-6px);
    box-shadow: 0 20px 60px rgba(44, 31, 20, 0.12);
  }

  .testimonial-card {
    transition: transform 0.3s ease, box-shadow 0.3s ease;
  }
  .testimonial-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 16px 48px rgba(44, 31, 20, 0.1);
  }

  .btn-primary {
    transition: transform 0.25s ease, box-shadow 0.25s ease, background-color 0.25s ease;
  }
  .btn-primary:hover {
    transform: scale(1.03);
    box-shadow: 0 8px 30px rgba(139, 94, 60, 0.4);
  }
  .btn-secondary {
    transition: transform 0.25s ease, background-color 0.25s ease, color 0.25s ease;
  }
  .btn-secondary:hover {
    transform: scale(1.03);
    background-color: rgba(255,255,255,0.15);
  }

  .stat-card {
    transition: transform 0.3s ease;
  }
  .stat-card:hover {
    transform: translateY(-3px);
  }

  .process-step::before {
    content: '';
    position: absolute;
    top: 2rem;
    left: calc(50% + 2.5rem);
    width: calc(100% - 5rem);
    height: 1px;
    background: linear-gradient(90deg, #8b5e3c, transparent);
  }

  .quote-mark {
    font-family: 'Playfair Display', serif;
    font-size: 8rem;
    line-height: 0.8;
    color: #8b5e3c;
    opacity: 0.15;
    position: absolute;
    top: -1rem;
    left: 1rem;
  }

  .floating-badge {
    animation: pulse-badge 2.5s infinite;
  }

  .section-line {
    width: 60px;
    height: 3px;
    background: linear-gradient(90deg, #8b5e3c, #c4956a);
    border-radius: 2px;
  }

  .nav-link {
    position: relative;
    transition: color 0.3s ease;
  }
  .nav-link::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 0;
    width: 0;
    height: 2px;
    background: #8b5e3c;
    transition: width 0.3s ease;
  }
  .nav-link:hover::after { width: 100%; }
  .nav-link:hover { color: #8b5e3c; }

  .icon-circle {
    width: 56px;
    height: 56px;
    border-radius: 50%;
    background: linear-gradient(135deg, #faf8f5, #f0ebe3);
    display: flex;
    align-items: center;
    justify-content: center;
    border: 2px solid rgba(139, 94, 60, 0.15);
    flex-shrink: 0;
    transition: all 0.3s ease;
  }
  .service-card:hover .icon-circle {
    background: linear-gradient(135deg, #8b5e3c, #c4956a);
    border-color: transparent;
  }
  .service-card:hover .icon-circle svg {
    stroke: white;
  }

  input, textarea, select {
    transition: border-color 0.3s ease, box-shadow 0.3s ease;
  }
  input:focus, textarea:focus {
    outline: none;
    border-color: #8b5e3c;
    box-shadow: 0 0 0 3px rgba(139, 94, 60, 0.1);
  }

  .scroll-indicator {
    width: 28px;
    height: 44px;
    border: 2px solid rgba(255,255,255,0.4);
    border-radius: 20px;
    position: relative;
    margin: 0 auto;
  }
  .scroll-indicator::before {
    content: '';
    position: absolute;
    top: 6px;
    left: 50%;
    transform: translateX(-50%);
    width: 4px;
    height: 8px;
    background: white;
    border-radius: 2px;
    animation: bounce-slow 2s ease-in-out infinite;
  }

  @media (max-width: 768px) {
    .diagonal-section {
      clip-path: polygon(0 2%, 100% 0%, 100% 98%, 0 100%);
      padding: 6rem 0;
    }
    .process-step::before { display: none; }
  }
</style>
</head>
